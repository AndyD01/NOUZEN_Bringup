controller_manager:
  ros__parameters:
    update_rate: 30  # Hz

    # Active controllers
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ===== DIFF DRIVE CONTROLLER (4WD Skid-Steer) =====
diff_drive_controller:
  ros__parameters:
    # Wheel joints
    left_wheel_names: ['front_left_wheel_joint', 'rear_left_wheel_joint']
    right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']

    # Kinematic parameters (NOUZEN robot)
    wheel_separation: 0.410  # Track width (m)
    wheel_separation_multiplier: 2.0
    wheel_radius: 0.0375     # Wheel radius (m)

    # Command timeout
    cmd_vel_timeout: 0.5

    # Publishing
    publish_rate: 30.0
    publish_wheel_data: true
    publish_odom: true
    publish_odom_tf: true
    
    # Odometry frames
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Closed-loop odometry with encoder feedback
    open_loop: false
    enable_odom_tf: true

    # Velocity limits
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        min_velocity: -1.0
        has_acceleration_limits: true
        max_acceleration: 2.0
        min_acceleration: -2.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 3.5
        min_velocity: -3.5
        has_acceleration_limits: true
        max_acceleration: 4.0
        min_acceleration: -4.0

# ===== JOINT STATE BROADCASTER =====
joint_state_broadcaster:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - rear_left_wheel_joint
      - front_right_wheel_joint
      - rear_right_wheel_joint
